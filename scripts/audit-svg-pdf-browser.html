<!DOCTYPE html>
<html>
<head>
<title>svg2pdf.js Compatibility Audit</title>
<style>
body { font-family: monospace; margin: 20px; background: #1a1a2e; color: #e0e0e0; }
table { border-collapse: collapse; width: 100%; margin-top: 10px; }
th, td { border: 1px solid #444; padding: 4px 8px; text-align: left; font-size: 13px; }
th { background: #2a2a4e; }
.pass { color: #4caf50; }
.fail { color: #f44336; }
.error { color: #ff9800; }
.notext { color: #888; }
#progress { margin: 10px 0; font-size: 14px; }
#summary { margin-top: 20px; padding: 12px; background: #2a2a4e; border-radius: 4px; white-space: pre-wrap; }
</style>
</head>
<body>
<h2>svg2pdf.js Compatibility Audit</h2>
<div id="progress">Loading examples...</div>
<div id="summary"></div>
<table id="results">
<thead><tr><th>Type</th><th>#</th><th>Name</th><th>&lt;text&gt;</th><th>PDF Text Ops</th><th>Verdict</th><th>Error</th></tr></thead>
<tbody></tbody>
</table>

<script type="module">
import { jsPDF } from 'https://esm.sh/jspdf@4.2.0';
import { svg2pdf } from 'https://esm.sh/svg2pdf.js@2.7.0';

// Fetch the example manifest from the running dev server
// We'll construct it from the cache directory listing
const CACHE_BASE = './cache/';

// We need the example catalog. Since we can't import TS directly,
// we'll fetch all SVGs from the cache dir and test each one.
// The page should be served from the project root (e.g. via the dev server).

async function fetchExampleList() {
    // Try to fetch the pre-built example list from the dev server
    // Fallback: we'll pass it via URL params or hardcode
    const resp = await fetch('./audit-manifest.json');
    if (resp.ok) return resp.json();

    // If no manifest, discover files from the cache directory
    throw new Error('Place audit-manifest.json in public/. Generate with: npx tsx scripts/gen-audit-manifest.ts');
}

function countSvgTextElements(svgText) {
    return (svgText.match(/<text[\s>]/g) || []).length;
}

function countPdfTextOps(pdfRaw) {
    const tj = (pdfRaw.match(/\)\s*Tj/g) || []).length;
    const tJ = (pdfRaw.match(/\]\s*TJ/g) || []).length;
    return tj + tJ;
}

async function testSvg(svgText, width, height) {
    const pdf = new jsPDF({
        orientation: width > height ? 'landscape' : 'portrait',
        unit: 'px',
        format: [width, height],
    });

    const parser = new DOMParser();
    const doc = parser.parseFromString(svgText, 'image/svg+xml');
    const svgEl = doc.querySelector('svg');
    if (!svgEl) throw new Error('No <svg>');

    await svg2pdf(svgEl, pdf, { x: 0, y: 0, width, height });
    const raw = pdf.output();
    return { pdfTextOps: countPdfTextOps(raw), pdfSize: raw.length };
}

function parseDimensions(svgText) {
    const parser = new DOMParser();
    const doc = parser.parseFromString(svgText, 'image/svg+xml');
    const svg = doc.querySelector('svg');
    if (!svg) return { width: 800, height: 600 };

    const w = parseFloat(svg.getAttribute('width') || '');
    const h = parseFloat(svg.getAttribute('height') || '');
    if (w > 0 && h > 0) return { width: w, height: h };

    const vb = svg.getAttribute('viewBox');
    if (vb) {
        const parts = vb.split(/[\s,]+/).map(Number);
        if (parts.length === 4 && parts[2] > 0 && parts[3] > 0) return { width: parts[2], height: parts[3] };
    }
    return { width: 800, height: 600 };
}

async function main() {
    const progress = document.getElementById('progress');
    const tbody = document.querySelector('#results tbody');
    const summaryEl = document.getElementById('summary');

    let manifest;
    try {
        manifest = await fetchExampleList();
    } catch (e) {
        progress.textContent = e.message;
        return;
    }

    progress.textContent = `Testing ${manifest.length} examples...`;

    const results = [];
    const byType = {};

    for (let i = 0; i < manifest.length; i++) {
        const { diagramType, name, file } = manifest[i];
        progress.textContent = `Testing ${i + 1}/${manifest.length}: ${diagramType} - ${name}`;

        let svgText;
        try {
            const resp = await fetch(CACHE_BASE + file);
            svgText = await resp.text();
        } catch {
            results.push({ diagramType, name, file, verdict: 'ERROR', error: 'fetch failed' });
            continue;
        }

        const textCount = countSvgTextElements(svgText);
        const dims = parseDimensions(svgText);
        let verdict, pdfTextOps = 0, error = null;

        if (textCount === 0) {
            verdict = 'NO_TEXT';
        } else {
            try {
                const result = await testSvg(svgText, dims.width, dims.height);
                pdfTextOps = result.pdfTextOps;
                verdict = pdfTextOps > 0 ? 'PASS' : 'FAIL';
            } catch (e) {
                verdict = 'ERROR';
                error = e.message;
            }
        }

        const r = { diagramType, name, file, textCount, pdfTextOps, verdict, error };
        results.push(r);

        if (!byType[diagramType]) byType[diagramType] = [];
        byType[diagramType].push(r);

        const tr = document.createElement('tr');
        tr.innerHTML = `
            <td>${diagramType}</td>
            <td>${i + 1}</td>
            <td>${name}</td>
            <td>${textCount}</td>
            <td>${pdfTextOps}</td>
            <td class="${verdict.toLowerCase()}">${verdict}</td>
            <td>${error || ''}</td>
        `;
        tbody.appendChild(tr);
    }

    // Build summary
    const vectorTypes = [];
    const rasterTypes = [];

    for (const [type, exs] of Object.entries(byType).sort((a, b) => a[0].localeCompare(b[0]))) {
        const hasFail = exs.some(e => e.verdict === 'FAIL' || e.verdict === 'ERROR');
        if (hasFail) rasterTypes.push(type);
        else vectorTypes.push(type);
    }

    summaryEl.textContent =
        `=== Summary ===\n\n` +
        `Vector OK (${vectorTypes.length}): ${vectorTypes.join(', ')}\n` +
        `Needs raster (${rasterTypes.length}): ${rasterTypes.join(', ')}\n\n` +
        `=== Code snippet ===\n\n` +
        `const rasterPdfDiagramTypes = new Set(${JSON.stringify(rasterTypes)});`;

    progress.textContent = `Done! ${results.length} examples tested.`;
}

main();
</script>
</body>
</html>
