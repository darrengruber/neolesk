apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: rivet-db
spec:
  imageName: ghcr.io/cloudnative-pg/postgresql:17.5
  instances: 1

  bootstrap:
    initdb:
      database: rivet
      owner: rivet

  enableSuperuserAccess: false

  storage:
    storageClass: longhorn-nfs-delete-ext4-cache
    size: 5Gi
