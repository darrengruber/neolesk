apiVersion: v1
kind: ConfigMap
metadata:
  name: rivet-engine-config
data:
  config.jsonc: |
    {
      "nats": {
        "addresses": ["nats.kroki.svc.cluster.local:4222"]
      },
      "topology": {
        "datacenter_label": 1,
        "datacenters": [{
          "name": "default",
          "datacenter_label": 1,
          "is_leader": true,
          "public_url": "http://rivet-engine:6420",
          "peer_url": "http://rivet-engine.kroki.svc.cluster.local:6421",
          "proxy_url": "http://rivet-engine.kroki.svc.cluster.local:6420"
        }]
      }
    }
