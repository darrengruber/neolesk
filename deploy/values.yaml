# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/app-template-4.6.0/charts/other/app-template/values.schema.json
---
controllers:
  main:
    strategy: Recreate
    pod:
      securityContext:
        runAsUser: 101
        runAsGroup: 101
        fsGroup: 101
    containers:
      main:
        image:
          repository: darren/neolesk
          tag: latest
          pullPolicy: IfNotPresent
        ports:
          - name: http
            containerPort: 8080
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
        probes:
          startup:
            enabled: true
            custom: true
            spec:
              exec:
                command: ["wget", "-qO/dev/null", "http://localhost:8080/"]
              initialDelaySeconds: 2
              periodSeconds: 3
              timeoutSeconds: 3
              failureThreshold: 10
          liveness:
            enabled: true
            custom: true
            spec:
              exec:
                command: ["wget", "-qO/dev/null", "http://localhost:8080/"]
              periodSeconds: 10
              timeoutSeconds: 5
              failureThreshold: 3
          readiness:
            enabled: true
            custom: true
            spec:
              exec:
                command: ["wget", "-qO/dev/null", "http://localhost:8080/"]
              periodSeconds: 5
              timeoutSeconds: 3
              failureThreshold: 3

persistence:
  tmp:
    enabled: true
    type: emptyDir
    globalMounts:
      - path: /tmp

service:
  main:
    controller: main
    ports:
      http:
        port: 80
        targetPort: 8080
