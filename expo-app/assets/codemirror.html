<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<title>Editor</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; overflow: hidden; font-family: system-ui, sans-serif; }
  .cm-editor { height: 100vh; }
  .cm-scroller { overflow: auto !important; }
  .cm-content { padding: 18px 0 !important; }
  .cm-line { padding: 0 16px !important; }
  .cm-gutters { padding-left: 8px; background: #f8fafc; border-right: 1px solid #e2e8f0; }
  .cm-activeLineGutter { background: #e2e8f0 !important; }
  .cm-activeLine { background: #f1f5f9 !important; }
  .cm-focused { outline: none !important; }
</style>
<script type="importmap">
{
  "imports": {
    "codemirror": "https://esm.sh/codemirror@6.0.1",
    "@codemirror/view": "https://esm.sh/@codemirror/view@6.36.5",
    "@codemirror/state": "https://esm.sh/@codemirror/state@6.5.2",
    "@codemirror/language": "https://esm.sh/@codemirror/language@6.11.0",
    "@codemirror/commands": "https://esm.sh/@codemirror/commands@6.8.1",
    "@codemirror/search": "https://esm.sh/@codemirror/search@6.5.10",
    "@codemirror/autocomplete": "https://esm.sh/@codemirror/autocomplete@6.18.6",
    "@codemirror/lang-xml": "https://esm.sh/@codemirror/lang-xml@6.1.0",
    "@codemirror/lang-json": "https://esm.sh/@codemirror/lang-json@6.0.1",
    "@codemirror/lang-yaml": "https://esm.sh/@codemirror/lang-yaml@6.1.2",
    "@codemirror/lang-markdown": "https://esm.sh/@codemirror/lang-markdown@6.3.2",
    "@codemirror/lang-sql": "https://esm.sh/@codemirror/lang-sql@6.8.0"
  }
}
</script>
<script type="module">
import { EditorView, lineNumbers, highlightActiveLine, highlightActiveLineGutter, keymap } from '@codemirror/view';
import { EditorState } from '@codemirror/state';
import { defaultKeymap, history, historyKeymap, indentWithTab } from '@codemirror/commands';
import { bracketMatching, indentOnInput, syntaxHighlighting, defaultHighlightStyle } from '@codemirror/language';
import { searchKeymap, highlightSelectionMatches } from '@codemirror/search';
import { closeBrackets, closeBracketsKeymap } from '@codemirror/autocomplete';

const languageLoaders = {
  xml: () => import('@codemirror/lang-xml').then(m => m.xml()),
  json: () => import('@codemirror/lang-json').then(m => m.json()),
  yaml: () => import('@codemirror/lang-yaml').then(m => m.yaml()),
  markdown: () => import('@codemirror/lang-markdown').then(m => m.markdown()),
  sql: () => import('@codemirror/lang-sql').then(m => m.sql()),
};

let currentLanguage = null;
let editor = null;
let suppressNextUpdate = false;

function postMessage(data) {
  if (window.ReactNativeWebView) {
    window.ReactNativeWebView.postMessage(JSON.stringify(data));
  } else if (window.parent !== window) {
    window.parent.postMessage(data, '*');
  }
}

const updateListener = EditorView.updateListener.of((update) => {
  if (update.docChanged && !suppressNextUpdate) {
    postMessage({ type: 'change', value: update.state.doc.toString() });
  }
  suppressNextUpdate = false;
});

async function createEditor(initialValue, language, wrap) {
  const extensions = [
    lineNumbers(),
    highlightActiveLine(),
    highlightActiveLineGutter(),
    history(),
    indentOnInput(),
    bracketMatching(),
    closeBrackets(),
    highlightSelectionMatches(),
    syntaxHighlighting(defaultHighlightStyle, { fallback: true }),
    keymap.of([
      ...closeBracketsKeymap,
      ...defaultKeymap,
      ...searchKeymap,
      ...historyKeymap,
      indentWithTab,
    ]),
    updateListener,
    EditorView.theme({
      '&': { fontSize: '14px', fontFamily: '"IBM Plex Mono", "SF Mono", "Menlo", monospace' },
    }),
  ];

  if (wrap) {
    extensions.push(EditorView.lineWrapping);
  }

  if (language && languageLoaders[language]) {
    try {
      const lang = await languageLoaders[language]();
      extensions.push(lang);
      currentLanguage = language;
    } catch (e) {
      console.warn('Language load failed:', e);
    }
  }

  editor = new EditorView({
    state: EditorState.create({ doc: initialValue || '', extensions }),
    parent: document.body,
  });

  postMessage({ type: 'ready' });
}

window.addEventListener('message', (event) => {
  const data = typeof event.data === 'string' ? JSON.parse(event.data) : event.data;

  if (data.type === 'init') {
    createEditor(data.value, data.language, data.wrap !== false);
  }

  if (data.type === 'setValue' && editor) {
    suppressNextUpdate = true;
    editor.dispatch({
      changes: { from: 0, to: editor.state.doc.length, insert: data.value },
    });
  }

  if (data.type === 'setLanguage' && editor && data.language !== currentLanguage) {
    // Recreate to swap language — simplest reliable approach
    const value = editor.state.doc.toString();
    editor.destroy();
    createEditor(value, data.language, true);
  }
});

// Auto-init if no message comes (for standalone preview)
setTimeout(() => {
  if (!editor) {
    createEditor('// Type your diagram code here\n', null, true);
  }
}, 500);
</script>
</head>
<body></body>
</html>
